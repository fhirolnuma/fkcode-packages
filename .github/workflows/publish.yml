name: Publish Packages

on:
  push:
    branches:
      - main

jobs:
  publish-nuxt-auth:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com

      - name: Publish @fkcode/nuxt-auth
        run: npm publish
        working-directory: nuxt-auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
